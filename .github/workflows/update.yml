name: Update dashboard data
on:
  workflow_dispatch:
  schedule:
    - cron: '5,35 13-20 * * 1-5'   # ~every 30 min during US market hours (UTC), Mon-Fri
    - cron: '15 21 * * 1-5'        # end-of-day snapshot
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install crypto lib
        run: pip install --quiet cryptography
      - name: Fetch + encrypt Schwab holdings
        env:
          SCHWAB_APP_KEY: ${{ secrets.SCHWAB_APP_KEY }}
          SCHWAB_APP_SECRET: ${{ secrets.SCHWAB_APP_SECRET }}
          SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          CLUB_PASSCODE: ${{ secrets.CLUB_PASSCODE }}
        run: python3 scripts/fetch_schwab.py
      - name: Publish if changed
        run: |
          git config user.name "clydesdale-bot"
          git config user.email "actions@github.com"
          git add data.enc.json
          git diff --cached --quiet || git commit -m "Update holdings [skip ci]"
          git push
